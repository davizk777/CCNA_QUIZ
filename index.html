<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado CCNA - Modo Celular</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #f0f0f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: #1e1e1e;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .titulo {
            font-size: 1em;
            font-weight: bold;
        }

        .contador {
            font-size: 0.9em;
            color: #0d6efd;
            font-weight: bold;
        }

        .conteudo-questao {
            flex: 1;
            width: 100%;
            border: none;
            background: #111;
        }

        .controles {
            background: #1e1e1e;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-top: 1px solid #333;
        }

        .botoes-feedback {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            color: white;
            transition: 0.1s;
        }

        .btn-erro {
            background: #dc3545;
        }

        .btn-acerto {
            background: #198754;
        }

        .botoes-navegacao {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .btn-nav {
            background: #333;
            color: #ccc;
            padding: 10px 20px;
            font-size: 0.9em;
            border: 1px solid #444;
            border-radius: 6px;
            flex: 1;
        }

        .btn-nav:disabled {
            opacity: 0.3;
        }

        .score-board {
            font-size: 0.85em;
            color: #aaa;
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<header>
    <div class="titulo" id="nome-pagina">Página 1</div>
    <div class="contador" id="progresso">1 de 28</div>
</header>

<iframe class="conteudo-questao" id="frame-questao" src="PG1.html"></iframe>

<div class="controles">
    <div class="botoes-feedback">
        <button class="btn btn-erro" onclick="marcarResultado('errou')">Errei ❌</button>
        <button class="btn btn-acerto" onclick="marcarResultado('acertou')">Acertei  ✅</button>
    </div>

    <div class="botoes-navegacao">
        <button class="btn-nav" id="btn-ant" onclick="navegar(-1)">← Anterior</button>
        <button class="btn-nav" id="btn-prox" onclick="navegar(1)">Próxima →</button>
    </div>

    <div class="score-board" id="placar">
        Acertos: 0 | Erros: 0
    </div>
</div>

<script>
    const totalPaginas = 28;
    let paginaAtual = 1;

    let acertos = 0;
    let erros = 0;
    const historico = {};

    function atualizarTela() {
        const iframe = document.getElementById("frame-questao");
        iframe.src = `PG${paginaAtual}.html`;

        document.getElementById("nome-pagina").innerText = `Questão - Página ${paginaAtual}`;
        document.getElementById("progresso").innerText = `${paginaAtual} de ${totalPaginas}`;

        document.getElementById("btn-ant").disabled = (paginaAtual === 1);
        document.getElementById("btn-prox").disabled = (paginaAtual === totalPaginas);

        atualizarPlacar();
    }

    function marcarResultado(status) {
        if (historico[paginaAtual]) {
            if (historico[paginaAtual] === 'acertou') acertos--;
            if (historico[paginaAtual] === 'errou') erros--;
        }

        historico[paginaAtual] = status;
        if (status === 'acertou') acertos++;
        if (status === 'errou') erros++;

        atualizarPlacar();

        if (paginaAtual < totalPaginas) {
            setTimeout(() => {
                navegar(1);
            }, 800);
        } else {
            alert(`Fim do Simulado! \nTotal de Acertos: ${acertos}\nTotal de Erros: ${erros}`);
        }
    }

    function atualizarPlacar() {
        document.getElementById("placar").innerText = `Acertos: ${acertos} | Erros: ${erros}`;
    }

    function navegar(direcao) {
        const novaPagina = paginaAtual + direcao;
        if (novaPagina >= 1 && novaPagina <= totalPaginas) {
            paginaAtual = novaPagina;
            atualizarTela();
        }
    }

    atualizarTela();
</script>

</body>
</html>
